services:
  postgres:
    image: postgres:17-alpine
    container_name: acuamed_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acuamed}
      POSTGRES_USER: ${POSTGRES_USER:-acuamed_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acuamed_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acuamed_user} -d ${POSTGRES_DB:-acuamed}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acuamed_network

  redis:
    image: redis:7-alpine
    container_name: acuamed_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acuamed_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acuamed_backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-acuamed_user}:${POSTGRES_PASSWORD:-acuamed_secure_pass}@postgres:5432/${POSTGRES_DB:-acuamed}
      REDIS_URL: redis://redis:6379/0
      LM_STUDIO_URL: http://host.docker.internal:11234/v1
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - acuamed_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acuamed_celery
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-acuamed_user}:${POSTGRES_PASSWORD:-acuamed_secure_pass}@postgres:5432/${POSTGRES_DB:-acuamed}
      REDIS_URL: redis://redis:6379/0
      LM_STUDIO_URL: http://host.docker.internal:11234/v1
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info
    networks:
      - acuamed_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acuamed_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    command: npm run dev -- --host 0.0.0.0
    networks:
      - acuamed_network

volumes:
  postgres_data:
  redis_data:

networks:
  acuamed_network:
    driver: bridge
